<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crypto Market Overview</title>
  <style>
    html, body { margin: 0; padding: 0; background: #0b0f14; width: 100%; height: 100%; overflow: hidden; }
    .tradingview-widget-container { width: 100%; height: 100%; }
  </style>
</head>
<body>
  <div class="tradingview-widget-container">
    <div class="tradingview-widget-container__widget" style="width:100%;height:100%;"></div>
    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-market-overview.js" async>
    {
      "colorTheme": "dark",
      "dateRange": "1D",
      "showChart": true,
      "locale": "en",
      "width": "100%",
      "height": "100%",
      "largeChartUrl": "",
      "isTransparent": true,
      "showSymbolLogo": true,
      "showFloatingTooltip": true,
      "tabs": [
        {
          "title": "Crypto",
          "symbols": [
            { "s": "BYBIT:BTCUSDT", "d": "Bitcoin" },
            { "s": "BYBIT:ETHUSDT", "d": "Ethereum" },
            { "s": "BYBIT:SOLUSDT", "d": "Solana" },
            { "s": "BYBIT:TONUSDT", "d": "Toncoin" },
            { "s": "BYBIT:BNBUSDT", "d": "BNB" },
            { "s": "BYBIT:XRPUSDT", "d": "XRP" }
          ]
        },
        {
          "title": "Dominance",
          "symbols": [
            { "s": "CRYPTOCAP:BTC.D", "d": "BTC Dominance" },
            { "s": "CRYPTOCAP:TOTAL", "d": "Total Market Cap" },
            { "s": "CRYPTOCAP:TOTAL3", "d": "Total3 (ex BTC+ETH)" }
          ]
        }
      ]
    }
    </script>
  </div>
</body>
</html>
